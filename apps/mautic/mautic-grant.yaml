apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: mautic
spec:
  mariaDbRef:
    name: mariadb
    namespace: mariadb
  privileges:
    - "ALL PRIVILEGES"
  database: mautic
  table: "*"
  username: mautic
  grantOption: true
  cleanupPolicy: Delete
  requeueInterval: 30s
  retryInterval: 5s