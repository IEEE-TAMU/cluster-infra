apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: mautic
spec:
  mariaDbRef:
    name: mariadb
    namespace: mariadb
  passwordSecretKeyRef:
    name: mautic-secrets
    key: MAUTIC_DB_PASSWORD
  maxUserConnections: 20
  cleanupPolicy: Delete
  requeueInterval: 30s
  retryInterval: 5s