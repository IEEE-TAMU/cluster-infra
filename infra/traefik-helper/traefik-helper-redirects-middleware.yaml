apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: conference-redirect
spec:
  redirectRegex:
    regex: ^http://conference.ieeetamu.org/(.*) # internal traffic is only http
    replacement: https://conference.ieee-tamu.org/$1
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: www-redirect
spec:
  redirectRegex:
    regex: ^https?://www.ieeetamu.org/(.*)
    replacement: https://ieeetamu.org/$1
    permanent: true
